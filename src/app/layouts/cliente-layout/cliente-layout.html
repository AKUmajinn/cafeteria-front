<nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
  <div class="container">
    <a class="navbar-brand fw-bold text-cafe" href="/clientes/inicio">
      <i class="bi bi-cup-hot-fill me-2"></i>Cafetería
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item">
          <a class="nav-link text-uppercase fw-semibold" href="/clientes/inicio">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-uppercase fw-semibold" href="/clientes/catalogo">Menú</a>
        </li>
      </ul>
      
      <div class="d-flex align-items-center gap-3">
        
        @if (!auth.isLoggedIn()) {
          <a routerLink="/login" class="btn btn-outline-dark btn-sm rounded-pill px-3">Log In</a>
        } @else {
          <div class="d-flex align-items-center gap-3">
            <span class="fw-bold text-cafe small">Hola, {{ auth.getUserName() }}</span>
            <button (click)="logout()" class="btn btn-outline-danger btn-sm rounded-pill px-3">
              Salir
            </button>
          </div>
        }

        <button class="btn btn-cafe rounded-circle p-2 position-relative" routerLink="/clientes/carrito">
          <i class="bi bi-cart3 fs-5"></i>
          @if (carrito.cantidadTotal() > 0) {
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

            </span>
          }
