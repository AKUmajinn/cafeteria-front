<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card p-4 rounded-4 shadow-sm" style="width: 100%; max-width: 400px;">
    <h3 class="fw-bold text-center mb-4">Iniciar Sesión</h3>
    
    <div class="mb-3">
      <input [(ngModel)]="user.username" type="text" class="form-control py-2" placeholder="Usuario">
    </div>
    <div class="mb-3">
      <input [(ngModel)]="user.password" type="password" class="form-control py-2" placeholder="Contraseña">
    </div>
    
    <button (click)="onLogin()" class="btn btn-cafe w-100 rounded-pill py-2 fw-bold text-white">INGRESAR</button>
    
    <p class="mt-3 text-center small">
      ¿No tienes cuenta? <a routerLink="/register" class="text-cafe">Regístrate aquí</a>
    </p>
  </div>
</div>
