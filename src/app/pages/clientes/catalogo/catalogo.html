<div class="row mt-4">
  <div class="col-md-3">
    <div class="bg-white p-4 rounded-4 shadow-sm">
      <h5 class="fw-bold mb-4">FILTROS:</h5>
      <!-- Filtros estáticos por ahora; se conectan cuando exista
           GET /productos?categoriaId= -->
      <div class="mb-4">
        <label class="form-label fw-semibold">Categoría</label>
        <select class="form-select border-0 bg-light">
          <option>Todas</option>
          <option>Bebidas</option>
          <option>Comidas</option>
          <option>Postres</option>
        </select>
      </div>
      <div>
        <label class="form-label fw-semibold">Rango Precio</label>
        <input type="range" class="form-range" min="0" max="100">
      </div>
    </div>
  </div>

  <div class="col-md-9">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold m-0">NUESTRO MENÚ</h2>
      <div class="w-50 ms-4">
        <div class="input-group shadow-sm rounded-pill overflow-hidden">
          <span class="input-group-text bg-white border-0 ps-3"><i class="bi bi-search"></i></span>
          <input type="text" class="form-control border-0 shadow-none py-2" placeholder="Buscar...">
        </div>
      </div>
    </div>

    <div class="row g-4 text-center">
      @for (p of productos(); track p.id) {
        <div class="col-md-4">
          <div class="card h-100 border-0 shadow-sm rounded-4 p-4 transition-hover">
            <i class="bi bi-cup-hot text-cafe mb-3" style="font-size: 4.5rem;"></i>
            <h5 class="fw-bold text-dark">{{ p.nombre }}</h5>
            <p class="text-muted mb-2 small">{{ p.descripcion }}</p>
            <p class="fw-bold fs-5 text-cafe mb-3">${{ p.precioBase | number:'1.2-2' }}</p>
            <button class="btn btn-cafe w-100 rounded-pill fw-semibold" (click)="agregar(p)">
              Añadir
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</div>

<!-- Acceso flotante al carrito cuando tiene ítems -->
@if (carrito.cantidadTotal() > 0) {
  <a routerLink="/clientes/carrito"
     class="btn btn-cafe rounded-pill shadow position-fixed d-flex align-items-center gap-2 px-4 py-3"
     style="bottom: 24px; right: 24px; z-index: 1050;">
    <i class="bi bi-cart-fill"></i>
    Ver carrito ({{ carrito.cantidadTotal() }})
  </a>
}
