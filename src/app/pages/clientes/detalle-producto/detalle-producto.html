<div class="row mt-4 justify-content-center">
  <div class="col-md-10">
    <div class="bg-white p-5 rounded-4 shadow-sm row">
      
      <div class="col-md-6 text-center d-flex align-items-center justify-content-center bg-light rounded-4 p-5">
        <i class="bi bi-cup-hot text-cafe" style="font-size: 12rem;"></i>
      </div>

      <div class="col-md-6 ps-md-5 mt-4 mt-md-0">
        <h2 class="fw-bold mb-2">Cappuccino</h2>
        <p class="text-muted mb-3">Bebida de espresso con leche vaporizada y una generosa capa de espuma.</p>
        <h3 class="text-cafe fw-bold mb-4">$4.80</h3>

        <h6 class="fw-bold mb-3 text-uppercase">Opciones y Modificadores</h6>

        <div class="mb-3">
          <label class="form-label fw-semibold">Tamaño</label>
          <select class="form-select border-0 bg-light py-2">
            <option>Short</option>
            <option>Tall</option>
            <option>Grande</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Tipo de Leche</label>
          <select class="form-select border-0 bg-light py-2">
            <option>Entera</option>
            <option>Deslactosada</option>
            <option>Almendra</option>
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold d-block">Extras</label>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="extras" id="azucar" checked>
            <label class="form-check-label" for="azucar">Azúcar</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="extras" id="canela">
            <label class="form-check-label" for="canela">Canela</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="extras" id="jarabe">
            <label class="form-check-label" for="jarabe">Jarabe</label>
          </div>
        </div>

        <div class="d-flex align-items-center gap-3 mt-4">
          <button class="btn btn-cafe flex-grow-1 rounded-pill fw-semibold py-2">AÑADIR AL CARRITO</button>
          
          <div class="input-group w-auto bg-light rounded-pill p-1 shadow-sm">
            <button class="btn btn-sm btn-light border-0 rounded-circle fw-bold"><i class="bi bi-dash"></i></button>
            <input type="text" class="form-control text-center border-0 bg-transparent fw-bold px-0" value="1" style="width: 40px;" readonly>
            <button class="btn btn-sm btn-light border-0 rounded-circle fw-bold"><i class="bi bi-plus"></i></button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
