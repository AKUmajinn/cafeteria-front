<div class="p-5 mb-5 rounded-4 d-flex align-items-center justify-content-between" style="background-color: var(--cafe-secundario);">
  <div>
    <h1 class="display-3 fw-bold text-dark mb-3">Welcome</h1>
    <h4 class="fw-light text-dark">Promociones Destacadas</h4>
    <p class="mt-3">Disfruta de nuestro nuevo latte de temporada.</p>
    <button class="btn btn-dark btn-lg mt-2 px-4 rounded-pill" routerLink="/clientes/catalogo">Ver Menú</button>
  </div>
  <div class="d-none d-md-block text-cafe opacity-75">
    <i class="bi bi-cup-hot" style="font-size: 10rem;"></i>
  </div>
</div>

<div class="mb-5">
  <h3 class="fw-bold mb-4 text-center">CATEGORÍAS POPULARES</h3>
  
  <div class="row g-4 justify-content-center text-center">
    @for (cat of categorias(); track cat.id) {
      <div class="col-6 col-md-3">
        <a routerLink="/clientes/catalogo" class="card h-100 border-0 shadow-sm rounded-4 text-decoration-none cursor-pointer p-4 transition-hover d-block">
          <i class="bi {{ obtenerIcono(cat.nombre) }} text-cafe mb-3" style="font-size: 3rem;"></i>
          <h5 class="card-title fw-bold text-dark">{{ cat.nombre }}</h5>
        </a>
      </div>
    }
  </div>
</div>
