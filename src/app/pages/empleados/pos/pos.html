<div class="row" style="min-height: 80vh;">
  
  <div class="col-lg-2">
    <h5 class="fw-bold mb-4 text-uppercase">Categorías</h5>
    <div class="d-flex flex-column gap-3">
      <button *ngFor="let cat of categorias" class="btn bg-white text-dark text-start py-3 px-4 rounded-4 shadow-sm border-0 d-flex align-items-center w-100">
        <i class="bi bi-cup-hot fs-4 me-3 text-cafe"></i> 
        <span class="fw-bold text-uppercase">{{ cat.nombre }}</span>
      </button>
    </div>
  </div>

  <div class="col-lg-7 border-start border-end px-4">
    <h5 class="fw-bold mb-4 text-uppercase">Productos</h5>
    <div class="row g-3">
      
      <div class="col-md-4">
        <div class="bg-white p-3 rounded-4 shadow-sm text-center d-flex flex-column h-100">
          <div class="bg-light rounded-3 py-3 mb-2">
            <i class="bi bi-cup-hot text-cafe fs-1"></i>
          </div>
          <h6 class="fw-bold mb-2">Latte</h6>
          <div class="mt-auto d-flex justify-content-center gap-2">
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-plus"></i></button>
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-dash"></i></button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="bg-white p-3 rounded-4 shadow-sm text-center d-flex flex-column h-100">
          <div class="bg-light rounded-3 py-3 mb-2">
            <i class="bi bi-cup text-cafe fs-1"></i>
          </div>
          <h6 class="fw-bold mb-2">Capuccino</h6>
          <div class="mt-auto d-flex justify-content-center gap-2">
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-plus"></i></button>
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-dash"></i></button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="bg-white p-3 rounded-4 shadow-sm text-center d-flex flex-column h-100">
          <div class="bg-light rounded-3 py-3 mb-2">
            <i class="bi bi-bag-heart text-cafe fs-1"></i>
          </div>
          <h6 class="fw-bold mb-2">Muffin</h6>
          <div class="mt-auto d-flex justify-content-center gap-2">
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-plus"></i></button>
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-dash"></i></button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="bg-white p-3 rounded-4 shadow-sm text-center d-flex flex-column h-100">
          <div class="bg-light rounded-3 py-3 mb-2">
            <i class="bi bi-cup-hot text-cafe fs-1"></i>
          </div>
          <h6 class="fw-bold mb-2">Latte</h6>
          <div class="mt-auto d-flex justify-content-center gap-2">
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-plus"></i></button>
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-dash"></i></button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="bg-white p-3 rounded-4 shadow-sm text-center d-flex flex-column h-100">
          <div class="bg-light rounded-3 py-3 mb-2">
            <i class="bi bi-cake2 text-cafe fs-1"></i>
          </div>
          <h6 class="fw-bold mb-2">Sándwich</h6>
          <div class="mt-auto d-flex justify-content-center gap-2">
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-plus"></i></button>
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-dash"></i></button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="bg-white p-3 rounded-4 shadow-sm text-center d-flex flex-column h-100">
          <div class="bg-light rounded-3 py-3 mb-2">
            <i class="bi bi-cake2 text-cafe fs-1"></i>
          </div>
          <h6 class="fw-bold mb-2">Sándwich</h6>
          <div class="mt-auto d-flex justify-content-center gap-2">
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-plus"></i></button>
            <button class="btn btn-sm btn-light border rounded-circle px-2 fw-bold"><i class="bi bi-dash"></i></button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="col-lg-3">
    <h5 class="fw-bold mb-4 text-uppercase">Ticket Actual</h5>
    <div class="bg-white p-4 rounded-4 shadow-sm d-flex flex-column" style="height: calc(100% - 2.5rem);">
      
      <div class="grow overflow-auto pe-2">
        <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
          <span class="fw-semibold">Latte</span>
          <span class="text-muted">1</span>
          <span class="fw-bold">$3.50</span>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
          <span class="fw-semibold">Capuccino</span>
          <span class="text-muted">1</span>
          <span class="fw-bold">$1.50</span>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
          <span class="fw-semibold">Café</span>
          <span class="text-muted">1</span>
          <span class="fw-bold">$2.00</span>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
          <span class="fw-semibold">Postres</span>
          <span class="text-muted">1</span>
          <span class="fw-bold">$1.50</span>
        </div>
      </div>

      <div class="mt-4 pt-3 border-top">
        <div class="d-flex justify-content-between mb-2">
          <span class="text-muted fw-semibold">Subtotal</span>
          <span class="fw-bold">$15.50</span>
        </div>
        <div class="d-flex justify-content-between mb-4 bg-light p-3 rounded-3">
          <span class="fw-bold fs-5">Total</span>
          <span class="fw-bold fs-5 text-cafe">$15.50</span>
        </div>
        <button class="btn btn-cafe w-100 py-3 rounded-pill fw-bold fs-6 shadow-sm">
          PROCESAR PEDIDO
        </button>
      </div>

    </div>
  </div>

</div>
